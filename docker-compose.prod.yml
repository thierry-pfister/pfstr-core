services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pfstr-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Database=pfstr;Username=pfstr;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - Authentication__ApiKey=${API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pfstr

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}
    container_name: pfstr-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://pfstr-api:8080
      - API_KEY=${API_KEY}
    depends_on:
      - api
    networks:
      - pfstr

  postgres:
    image: postgres:17-alpine
    container_name: pfstr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pfstr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pfstr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfstr"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pfstr

  redis:
    image: redis:7-alpine
    container_name: pfstr-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pfstr

networks:
  pfstr:

volumes:
  postgres_data:
  redis_data:
  uploads_data:
