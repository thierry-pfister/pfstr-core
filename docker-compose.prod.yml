services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pfstr-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Database=pfstr;Username=pfstr;Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pfstr

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: pfstr-admin
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://192.168.1.111:8080
    depends_on:
      - api
    networks:
      - pfstr

  postgres:
    image: postgres:17-alpine
    container_name: pfstr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pfstr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pfstr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfstr"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pfstr

  redis:
    image: redis:7-alpine
    container_name: pfstr-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pfstr

networks:
  pfstr:

volumes:
  postgres_data:
  redis_data:
